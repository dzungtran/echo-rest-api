basePath: /
definitions:
  domains.Org:
    properties:
      code:
        type: string
      created_at:
        type: string
      description:
        type: string
      domain:
        type: string
      id:
        type: integer
      logo:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  domains.Project:
    properties:
      archived_at:
        type: string
      code:
        type: string
      created_at:
        type: string
      default_language:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      org_id:
        type: integer
      settings:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  domains.User:
    description: User account information
    properties:
      code:
        description: User last name
        example: 95a8d1aa-xxx-xxx-0c15d41
        type: string
      created_at:
        type: string
      email:
        example: email@api.com
        type: string
      first_name:
        description: User first name
        example: Dzung
        type: string
      id:
        description: User indetifier number
        example: 1
        type: integer
      last_name:
        description: User last name
        example: Tran
        type: string
      phone:
        example: +84 0986415xxxx
        type: string
      status:
        allOf:
        - $ref: '#/definitions/domains.UserStatus'
        enum:
        - active
        - deactivated
        - banned
        example: active
      updated_at:
        type: string
    type: object
  domains.UserStatus:
    enum:
    - active
    - deactivated
    - banned
    - invited
    type: string
    x-enum-varnames:
    - UserStatusActive
    - UserStatusDeactivated
    - UserStatusBanned
    - UserStatusInvited
  dto.CreateOrgReq:
    properties:
      description:
        type: string
      domain:
        type: string
      logo:
        type: string
      name:
        type: string
    type: object
  dto.CreateProjectReq:
    properties:
      default_language:
        type: string
      description:
        type: string
      name:
        type: string
      org_id:
        type: integer
      timezone:
        type: string
    type: object
  dto.InviteUsers:
    properties:
      emails:
        items:
          type: string
        type: array
    type: object
  dto.UpdateOrgReq:
    properties:
      description:
        type: string
      domain:
        type: string
      logo:
        type: string
      name:
        type: string
    type: object
  dto.UpdateProjectReq:
    properties:
      default_language:
        type: string
      description:
        type: string
      name:
        type: string
      timezone:
        type: string
    type: object
  wrapper.FailResponse:
    properties:
      message:
        example: Example message
        type: string
      success:
        example: false
        type: boolean
    type: object
  wrapper.SuccessResponse:
    properties:
      data: {}
      metadata: {}
      success:
        example: true
        type: boolean
    type: object
info:
  contact:
    email: support@api.com
    name: Dzung Tran
    url: https://docs.api.com/support
  description: This documentation for Echo REST server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Echo REST API
  version: "1.0"
paths:
  /admin/orgs:
    get:
      consumes:
