      description: Get list of organizations for current user
      parameters:
      - description: Number of records should be returned
        in: query
        name: limit
        type: integer
      - description: Page
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/wrapper.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domains.Org'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/wrapper.FailResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/wrapper.FailResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/wrapper.FailResponse'
      security:
      - XFirebaseBearer: []
      summary: Get list org
      tags:
      - orgs
    post:
      consumes:
      - application/json
      description: Create a new organization
      parameters:
      - description: Organization creation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrgReq'
